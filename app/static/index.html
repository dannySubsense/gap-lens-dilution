<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gap Lens Dilution Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/design-tokens.css">
    <link rel="stylesheet" href="/static/css/variables.css">
    <link rel="stylesheet" href="/static/css/base.css">
    <link rel="stylesheet" href="/static/css/utilities.css">
    <link rel="stylesheet" href="/static/css/styles.css">
    <link rel="stylesheet" href="/static/css/components/header.css">
    <link rel="stylesheet" href="/static/css/components/ticker-input.css">
    <link rel="stylesheet" href="/static/css/components/share-structure.css">
    <link rel="stylesheet" href="/static/css/components/jmt415.css">
    <link rel="stylesheet" href="/static/css/components/headlines.css">
    <link rel="stylesheet" href="/static/css/components/risk.css">
    <link rel="stylesheet" href="/static/css/components/offering-ability.css">
    <link rel="stylesheet" href="/static/css/components/in-play.css">
</head>
<body>
    <div id="app">
        <!-- Header Section -->
        <header class="app-header" id="companyHeader">
        </header>

        <!-- Search Section -->
        <section class="search-section">
            <div id="tickerInputSection"></div>
        </section>

        <!-- Main Content Section -->
        <main class="main-content">
            <!-- Headlines/News Feed Section -->
            <section class="headlines-section">
                <div id="headlinesSection"></div>
            </section>

            <!-- Risk Assessment Section -->
            <section class="risk-section">
                <div id="riskAssessmentSection"></div>
            </section>

            <!-- Offering Ability Section -->
            <section class="offering-section">
                <div id="offeringAbilitySection"></div>
            </section>

            <!-- In-Play Dilution Section -->
            <section class="inplay-section">
                <div id="inPlayDilutionSection"></div>
            </section>

            <!-- JMT415 Section -->
            <section class="jmt415-section">
                <div id="jmt415Section"></div>
            </section>
        </main>

        <!-- Chart Section -->
        <section class="chart-section">
            <div class="timeframe-buttons">
                <button class="timeframe-button active" data-timeframe="3M">3M</button>
                <button class="timeframe-button" data-timeframe="1D">1D</button>
                <button class="timeframe-button" data-timeframe="1W">1W</button>
                <button class="timeframe-button" data-timeframe="1M">1M</button>
                <button class="timeframe-button" data-timeframe="YTD">YTD</button>
                <button class="timeframe-button" data-timeframe="1Y">1Y</button>
            </div>
            <div class="chart-container">
                <div class="chart-placeholder">
                    <p>Chart data loading...</p>
                    <p><em>Chart will appear here</em></p>
                </div>
            </div>
        </section>
    </div>

    <!-- JavaScript -->
    <script src="/static/js/utils/formatters.js"></script>
    <script src="/static/js/utils/validators.js"></script>
    <script src="/static/js/state.js"></script>
    <script src="/static/js/components/input.js"></script>
    <script src="/static/js/components/HeaderComponent.js"></script>
    <script src="/static/js/components/TickerInputSection.js"></script>
    <script src="/static/js/components/ShareStructureSection.js"></script>
    <script src="/static/js/components/metrics.js"></script>
    <script src="/static/js/components/RiskAssessmentSection.js"></script>
    <script src="/static/js/components/JMT415Section.js"></script>
    <script src="/static/js/components/HeadlinesSection.js"></script>
    <script src="/static/js/components/OfferingAbilitySection.js"></script>
    <script src="/static/js/components/InPlayDilutionSection.js"></script>
    <script src="/static/js/parsers/jmt415-parser.js"></script>
    <script src="/static/js/parsers/news-parser.js"></script>
    <script src="/static/js/parsers/offering-parser.js"></script>
    <script src="/static/js/parsers/dilution-parser.js"></script>
    <script src="/static/js/components/timeframe-selector.js"></script>
    <script src="/static/js/components/chart.js"></script>
    <script src="/static/js/services/api.js"></script>
    <script src="/static/js/main.js"></script>
</body>
</html>
